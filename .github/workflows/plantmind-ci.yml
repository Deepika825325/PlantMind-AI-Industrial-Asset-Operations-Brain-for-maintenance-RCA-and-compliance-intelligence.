name: PlantMind CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    name: Backend tests, Docker and evaluation smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ""
      PLANTMIND_DATA_BACKEND: "json"
      PLANTMIND_PRODUCTION_ANOMALY_MODEL_VERSION: ""
      PLANTMIND_PRODUCTION_MODEL_VERSION: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx python-multipart pip-audit

      - name: Backend compilation check
        run: |
          python -m compileall -q apps tests scripts evaluation

      - name: Backend unit tests
        run: |
          python -m pytest -q

      - name: Docker Compose config check
        run: |
          docker compose --env-file .env.example config --quiet

      - name: Docker build check
        continue-on-error: true
        run: |
          docker compose --env-file .env.example build

      - name: Dependency scan
        continue-on-error: true
        run: |
          pip-audit --progress-spinner off || true

      - name: Evaluation smoke test
        run: |
          python -m compileall -q evaluation

      - name: Release readiness smoke
        run: |
          python scripts/validate_release_readiness.py

  frontend:
    name: Frontend lint, type check and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: apps/web

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: "http://127.0.0.1:8000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: |
          npm install --no-audit --no-fund

      - name: Create CI frontend environment
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000" > .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local

      - name: Frontend lint
        run: |
          npm run lint

      - name: TypeScript check
        continue-on-error: true
        run: |
          npx tsc --noEmit

      - name: Frontend build
        run: |
          npm run build

  security:
    name: Secret and source security checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for committed secrets
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no local env files are committed
        run: |
          forbidden_files=".env .env.local apps/web/.env.local"
          for file in $forbidden_files; do
            if git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              echo "Forbidden environment file committed: $file"
              exit 1
            fi
          done
          echo "No forbidden local env files are tracked."

      - name: Verify security tests exist
        run: |
          test -f tests/security_hardening/test_security_review_and_policy.py
          test -f tests/observability/test_prometheus_metrics.py
