name: PlantMind CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  backend:
    name: Backend tests, Docker and release readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Backend compilation check
        run: |
          python -m compileall -q apps tests scripts evaluation

      - name: Backend unit tests
        env:
          DATABASE_URL: ""
          PLANTMIND_DATA_BACKEND: ""
          PLANTMIND_PRODUCTION_ANOMALY_MODEL_VERSION: ""
          PLANTMIND_PRODUCTION_MODEL_VERSION: ""
        run: |
          python -m pytest -q

      - name: Docker Compose config check
        run: |
          docker compose --env-file .env.example config --quiet

      - name: Docker build check
        run: |
          docker compose --env-file .env.example build

      - name: Release readiness smoke
        run: |
          python scripts/validate_release_readiness.py

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --no-audit --no-fund

      - name: Create CI frontend environment
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000" > .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local

      - name: Frontend lint
        run: npm run lint

      - name: Frontend build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  security:
    name: Secret and source security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for committed secrets
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no local env files are committed
        run: |
          forbidden_files=".env .env.local apps/web/.env.local"
          for file in $forbidden_files; do
            if git ls-files --error-unmatch "$file" >/dev/null 2>&1; then
              echo "Forbidden environment file committed: $file"
              exit 1
            fi
          done
          echo "No forbidden local env files are tracked."

      - name: Verify security tests exist
        run: |
          test -f tests/security_hardening/test_security_review_and_policy.py
          test -f tests/observability/test_prometheus_metrics.py
