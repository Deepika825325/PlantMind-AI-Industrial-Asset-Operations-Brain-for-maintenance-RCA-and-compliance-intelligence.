name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}

services:
  postgres:
    image: postgres:17.10-alpine3.24
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plantmind}
      POSTGRES_USER: ${POSTGRES_USER:-plantmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plantmind_dev_password}
      TZ: ${TZ:-Asia/Kolkata}

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - plantmind_network


  redis:
    image: redis:8.8.0-alpine3.23
    restart: unless-stopped

    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec"
      ]

    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

    networks:
      - plantmind_network


  qdrant:
    image: qdrant/qdrant:v1.18.2
    restart: unless-stopped

    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO

    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c ': > /dev/tcp/127.0.0.1/6333'"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - plantmind_network


  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped

    command:
      [
        "server",
        "/data",
        "--console-address",
        ":9001"
      ]

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-plantmind}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-plantmind_dev_password}

    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

    volumes:
      - minio_data:/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail http://127.0.0.1:9000/minio/health/live || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    networks:
      - plantmind_network


  api:
    image: plantmind-api:day3

    build:
      context: .
      dockerfile: Dockerfile.api

    restart: unless-stopped
    init: true

    environment:
      APP_ENV: ${APP_ENV:-development}
      TZ: ${TZ:-Asia/Kolkata}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PLANTMIND_DATA_BACKEND: ${PLANTMIND_DATA_BACKEND:-json}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}

      DATABASE_URL: ${DATABASE_URL:-postgresql://plantmind:plantmind_dev_password@postgres:5432/plantmind}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-plantmind_documents}

      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-plantmind}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-plantmind}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-plantmind_dev_password}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-plantmind}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-plantmind_dev_password}
      MINIO_SECURE: ${MINIO_SECURE:-false}

    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

      qdrant:
        condition: service_healthy

      minio:
        condition: service_healthy

    networks:
      - plantmind_network


  web:
    image: plantmind-web:day3

    build:
      context: .
      dockerfile: Dockerfile.web

      args:
        NPM_VERSION: 11.6.2
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}

    restart: unless-stopped
    init: true

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000}
      PORT: 3000
      HOSTNAME: 0.0.0.0

    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"

    depends_on:
      api:
        condition: service_healthy

    networks:
      - plantmind_network


volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}-postgres-data

  redis_data:
    name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}-redis-data

  qdrant_data:
    name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}-qdrant-data

  minio_data:
    name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}-minio-data


networks:
  plantmind_network:
    name: ${COMPOSE_PROJECT_NAME:-plantmind-nexus}-network
    driver: bridge
